x-deploy-resources: &deploy_resources
  deploy:
    resources:
      limits:
        cpus: '2.0'
        memory: 4G
      reservations:
        cpus: '0.5'
        memory: 512M

services:
  relational-database:
    image: postgres:16
    container_name: postgres
    <<: *deploy_resources
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    command: postgres -c max_wal_size=4GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 30s
      retries: 5
    networks:
      - data_warehouse_network
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./init_pg_db:/docker-entrypoint-initdb.d
      - ./data:/init_data:ro
networks:
  data_warehouse_network:
    driver: bridge