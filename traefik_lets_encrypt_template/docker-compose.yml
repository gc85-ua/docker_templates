services:
  reverse-proxy:
    image: traefik:latest
    container_name: traefik
    environment:
      - CLOUDFLARE_DNS_API_TOKEN 
      # Export your Cloudflare API token as an environment variable before running docker-compose
      # ensure tha token has permissions to manage DNS records for the domain(s) you want to secure with Let's Encrypt
    command:
      # Enables the Traefik dashboard on port 8080, will be exposed only on localhost for security 
      #as shown in the ports section
      - "--api.insecure=true" 
      # Tells Traefik to listen to Docker events and automatically configure routes based on container labels
      - "--providers.docker=true"
      # Security: Only route containers with traefik.enable=true label, prevents accidental exposure of all containers
      - "--providers.docker.exposedbydefault=false"
      # Define the HTTP entrypoint
      - "--entrypoints.web.address=:80"
      # HTTPS entrypoint with TLS configuration
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS for better security, ensures all traffic is encrypted
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Configure the ACME certificate resolver to use Cloudflare's DNS challenge, 
      # this allows Traefik to automatically obtain and renew SSL certificates from Let's Encrypt 
      # using Cloudflare's API to prove domain ownership
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=your@email.com" # Replace with your email
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      # Cloudflare's IP ranges for trusted proxy headers, necessary for 
      # correct client IP forwarding when using Cloudflare as a CDN
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"
      # Logging configuration for better visibility and troubleshooting, adjust log level as needed
      - "--log.level=DEBUG" # Can be set to INFO or ERROR in production, DEBUG is useful for troubleshooting
      - "--accesslog=true" # Enable access logs for better visibility into incoming requests
    ports:
      - "80:80" # The public HTTP port
      - "443:443" # The public HTTPS port
      - "127.0.0.1:8080:8080" # The Traefik Dashboard, only accessible from localhost for security
    volumes:
      # Traefik needs access to the Docker socket to discover containers and their labels
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # Store ACME certificates on the host to persist them across container restarts
      - "./letsencrypt:/letsencrypt"
    networks:
      - reverse-proxy
    restart: always
  example-app: # Example application to demonstrate Traefik routing, replace with your actual app
    image: nginx:alpine
    container_name: example-app
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      # Route based on the Host header, replace with your domain
      - "traefik.http.routers.example-app.rule=Host(`example.yourdomain.com`)"
       # Use the HTTPS entrypoint
      - "traefik.http.routers.example-app.entrypoints=websecure"
       # Use the Cloudflare resolver for TLS
      - "traefik.http.routers.example-app.tls.certresolver=cloudflare"
      # Set up a middleware to pass the correct client IP from Cloudflare to the app, 
      # this is necessary because Cloudflare acts as a reverse proxy and can mask the original client IP
      - "traefik.http.routers.example-app.middlewares=cloudflare-ip" # Apply the middleware to set the correct client IP
      - "traefik.http.middlewares.cloudflare-ip.headers.customrequestheaders.X-Real-IP={custom_header_CF-Connecting-IP}" # Pass the original client IP from Cloudflare to the app as X-Real-IP header
    networks:
      - reverse-proxy
    restart: always

networks:
  # ensure this network is created before starting the container,
  # run: docker network create -d bridge reverse-proxy
  reverse-proxy:
    external: true